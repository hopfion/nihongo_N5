<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f2f1ec">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ことばの手帖">
<title>ことばの手帖</title>
<style>
:root{
  --paper:#f2f1ec;
  --card:#fbfaf6;
  --ink:#1f2a33;
  --mut:#6e7671;
  --line:#dcdcd2;
  --indigo:#2e4e6b;
  --indigo-deep:#223b52;
  --seal:#b2422f;
  --seal-soft:#f4e4df;
  --wash:#e9ebe2;
  --good:#2e6e4e;
  --good-bg:#e7f0ea;
  --bad:#a5392c;
  --bad-bg:#f6e6e2;
  --rt:#8a7f66;
  --jpserif:"Hiragino Mincho ProN","Hiragino Mincho Pro","Yu Mincho","YuMincho","Noto Serif CJK JP","Noto Serif JP","MS PMincho",serif;
  --ui:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic UI","Noto Sans CJK JP","PingFang TC","Microsoft JhengHei",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper);
  background-image:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,0) 240px);
  color:var(--ink);
  font-family:var(--ui);
  font-size:16px;
  line-height:1.65;
}
.wrap{max-width:760px;margin:0 auto;padding:0 16px}

/* ---- 書封式頁首 ---- */
header{border-bottom:1px solid var(--line)}
.cover{display:flex;align-items:stretch;gap:16px;padding:22px 0 14px}
.spine{
  writing-mode:vertical-rl;
  font-family:var(--jpserif);
  font-size:1.05rem;
  letter-spacing:.35em;
  color:#fff;
  background:var(--indigo);
  padding:14px 8px;
  border-radius:3px;
  align-self:stretch;
  display:flex;align-items:center;
  user-select:none;
}
.cover-main{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0}
.cover-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
h1{
  font-family:var(--jpserif);
  font-weight:600;
  font-size:1.75rem;
  margin:0;
  letter-spacing:.06em;
}
.head-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.badge{
  font-size:.78rem;color:var(--indigo-deep);
  background:var(--wash);border:1px solid var(--line);
  border-radius:999px;padding:3px 10px;white-space:nowrap;
}
.seal{
  width:34px;height:34px;flex-shrink:0;
  border:2px solid var(--seal);color:var(--seal);
  border-radius:6px;
  font-family:var(--jpserif);font-size:1.05rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  background:transparent;cursor:pointer;
}
.seal:hover{background:var(--seal-soft)}

/* ---- 分頁 ---- */
nav#tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
nav#tabs::-webkit-scrollbar{display:none}
.tab{
  appearance:none;background:none;border:none;cursor:pointer;
  font-family:var(--ui);font-size:.95rem;font-weight:600;color:var(--mut);
  padding:10px 12px 12px;border-bottom:3px solid transparent;white-space:nowrap;
}
.tab.on{color:var(--ink);border-bottom-color:var(--seal)}

main{padding:18px 0 8px;min-height:60vh}

/* ---- 通用元件 ---- */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:20px 22px;margin-bottom:14px;
  box-shadow:0 1px 2px rgba(40,45,50,.05),0 10px 26px -18px rgba(40,45,50,.25);
}
@media (prefers-reduced-motion:no-preference){
  .card{animation:rise .18s ease-out}
  @keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
}
.btn{
  appearance:none;cursor:pointer;
  font-family:var(--ui);font-size:.92rem;font-weight:600;
  color:var(--ink);background:#fff;border:1px solid var(--line);
  border-radius:999px;padding:8px 16px;
}
.btn:hover{border-color:var(--indigo)}
.btn.primary{background:var(--indigo);border-color:var(--indigo);color:#fff}
.btn.primary:hover{background:var(--indigo-deep)}
.btn.danger{color:var(--bad);border-color:var(--bad)}
.btn:disabled{opacity:.45;cursor:default}
.mini{
  appearance:none;cursor:pointer;font-size:.78rem;font-weight:600;
  color:var(--mut);background:#fff;border:1px solid var(--line);
  border-radius:6px;padding:3px 9px;
}
.mini.act{background:var(--indigo);border-color:var(--indigo);color:#fff}
select{
  font-family:var(--ui);font-size:.9rem;color:var(--ink);
  background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 10px;
}
.rowline{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.rowline .grow{flex:1}
.score{font-size:.85rem;color:var(--mut)}

/* ---- 例句卡 ---- */
.jp{
  font-family:var(--jpserif);
  font-size:1.5rem;line-height:2.3;
  margin:4px 0 2px;
}
ruby rt{font-size:.5em;color:var(--rt);font-weight:400;letter-spacing:0}
.hide-rt rt{display:none}
.romaji{font-family:Georgia,"Times New Roman",serif;font-style:italic;color:var(--indigo);font-size:1rem;margin:0 0 2px}
.zh{font-size:1.02rem;margin:2px 0 0}
.tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.tools .sp{flex:1}
.scene{
  background:var(--wash);border-left:3px solid var(--indigo);
  border-radius:0 8px 8px 0;padding:10px 14px;margin:0;
  font-size:.92rem;
}
.sec-t{
  font-size:.78rem;font-weight:700;letter-spacing:.18em;color:var(--seal);
  margin:20px 0 6px;
}
table.vocab{width:100%;border-collapse:collapse;font-size:.92rem}
table.vocab th{
  text-align:left;font-size:.75rem;font-weight:600;color:var(--mut);
  letter-spacing:.08em;padding:4px 8px;border-bottom:1px solid var(--line);
}
table.vocab td{padding:7px 8px;border-bottom:1px dashed var(--line);vertical-align:top}
table.vocab td.w{font-family:var(--jpserif);font-size:1.05rem}
table.vocab td.k{color:var(--rt)}
table.vocab td.r{font-family:Georgia,serif;font-style:italic;color:var(--indigo)}
.gp{margin:0 0 10px;font-size:.92rem}
.gp b{color:var(--indigo-deep);font-family:var(--jpserif);font-weight:600;margin-right:6px}
.navr{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.pos{font-size:.85rem;color:var(--mut)}

/* ---- 測驗 ---- */
.opts{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.opt{
  appearance:none;cursor:pointer;text-align:left;
  font-family:var(--ui);font-size:.98rem;color:var(--ink);
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:11px 15px;
}
.opt:hover{border-color:var(--indigo)}
.opt.correct{background:var(--good-bg);border-color:var(--good);color:var(--good);font-weight:700}
.opt.wrong{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
.opt:disabled{cursor:default}
.opts.two{flex-direction:row;flex-wrap:wrap}
.opts.two .opt{flex:1 1 40%;text-align:center;font-family:Georgia,serif;font-size:1.05rem}
.reveal{border-top:1px dashed var(--line);margin-top:18px;padding-top:14px}
.centerc{text-align:center;padding:26px 0}

/* ---- 五十音 ---- */
.krow{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.kcell{
  appearance:none;cursor:pointer;
  min-width:54px;padding:7px 6px;text-align:center;
  border:1px solid var(--line);border-radius:8px;background:#fff;
  font-family:var(--ui);
}
.kcell:hover{border-color:var(--indigo)}
.kcell .kk{font-family:var(--jpserif);font-size:1.35rem;display:block;line-height:1.35;color:var(--ink)}
.kcell .kr{font-size:.68rem;color:var(--mut)}
.kbig{font-family:var(--jpserif);font-size:4.2rem;text-align:center;margin:6px 0 2px;line-height:1.25}
.qword{font-family:var(--jpserif);font-size:2.4rem;text-align:center;margin:10px 0 4px;line-height:1.5}
.krow{display:flex;gap:14px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
.krow:last-child{border-bottom:none}
.kchar{font-family:var(--jpserif);font-size:2.1rem;min-width:52px;text-align:center;line-height:1.2}
.kinfo{flex:1;min-width:0}
.kread{font-size:.9rem;color:var(--ink);margin:2px 0}
.ksep{color:var(--faint);margin:0 6px}
.kex{font-size:.85rem;color:var(--sub);margin:2px 0 0}
.krd{cursor:pointer;border-bottom:1px dashed var(--faint)}
.gitem{padding:12px 0;border-bottom:1px solid var(--line)}
.gitem:last-child{border-bottom:none}
.gt{margin:0 0 2px;font-size:1.02rem}
.gnum{color:var(--faint);font-size:.85rem;margin-right:6px}
.gexp{font-size:.9rem;color:var(--sub);margin:0 0 6px}
.gsm{font-size:1.12rem !important;margin:4px 0 2px}
.gsm2{font-size:.92rem;margin:0 0 6px}
.btn.mini{padding:4px 12px;font-size:.78rem}
.kex2{font-size:.88rem;line-height:2;color:var(--ink)}
.sel{padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:transparent;font:inherit;color:var(--ink)}
.inp{flex:1;min-width:160px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:transparent;font:inherit;color:var(--ink)}
.syncbox{width:100%;min-height:88px;margin-top:10px;border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--ink);font-size:.8rem;padding:8px;box-sizing:border-box;resize:vertical}
.vrow{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer;align-items:baseline;flex-wrap:wrap}
.vrow:last-child{border-bottom:none}
.vw{font-family:var(--jpserif);font-size:1.12rem;min-width:5em}
.vk{color:var(--sub);font-size:.95rem}
.vr{color:var(--faint);font-size:.85rem}
.vz{margin-left:auto;text-align:right;font-size:.95rem}
.chunkwrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.chunk{padding:8px 14px;border:1.5px solid var(--line);border-radius:10px;background:transparent;font-family:var(--jpserif);font-size:1.05rem;cursor:pointer;color:var(--ink)}
.chunk.used{opacity:.3;pointer-events:none}
.ansline{min-height:2.4em;border:1.5px dashed var(--line);border-radius:10px;padding:10px 12px;margin-top:4px;font-family:var(--jpserif);font-size:1.12rem;line-height:2}
.ansline.ok{border-style:solid;border-color:#3e7d4f;background:rgba(62,125,79,.08)}
.ansline.bad{border-style:solid;border-color:#b3564d;background:rgba(179,86,77,.08)}
.faintt{color:var(--faint);font-size:.9rem;font-family:inherit}

/* ---- 設定 ---- */
.overlay{
  position:fixed;inset:0;background:rgba(31,42,51,.4);
  display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;
}
.hidden{display:none}
.sheet{background:var(--card);border-radius:14px;padding:20px 22px;width:100%;max-width:420px;border:1px solid var(--line)}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sheet-head h2{font-family:var(--jpserif);font-size:1.2rem;margin:0}
.icon-btn{appearance:none;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--mut)}
.srow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:.93rem}
.srow:last-child{border-bottom:none}
.srow .lbl{flex-shrink:0}
.srow input[type=range]{flex:1}
.srow .mut{color:var(--mut);font-size:.85rem}

footer{border-top:1px solid var(--line);margin-top:26px}
footer p{color:var(--mut);font-size:.78rem;line-height:1.7;padding:14px 0 26px;margin:0}

#toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:.88rem;
  padding:9px 18px;border-radius:999px;z-index:60;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#toast.show{opacity:1}

button:focus-visible,select:focus-visible,.seal:focus-visible{outline:2px solid var(--seal);outline-offset:2px}

@media (max-width:560px){
  h1{font-size:1.4rem}
  .jp{font-size:1.32rem}
  .card{padding:16px 15px}
  .spine{font-size:.9rem;padding:10px 6px}
  .kbig{font-size:3.2rem}
  .qword{font-size:1.9rem}
}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="cover">
      <div class="spine">ことばの手帖</div>
      <div class="cover-main">
        <div class="cover-top">
          <h1>ことばの手帖</h1>
          <div class="head-right">
            <button id="gearBtn" class="seal" title="設定" aria-label="設定">設</button>

      <button class="tab on" data-tab="learn">例句學習</button>

      <button class="tab" data-tab="gsent">文法例句</button>
      <button class="tab" data-tab="kanji">漢字</button>
      <button class="tab" data-tab="vbook">單字本</button>
      <button class="tab" data-tab="grammar">文法測驗</button>
      <button class="tab" data-tab="kquiz">漢字測驗</button>
      <button class="tab" data-tab="vocab">單字測驗</button>
      <button class="tab" data-tab="listen">聽力測驗</button>
      <button class="tab" data-tab="reading">閱讀</button>
      <button class="tab" data-tab="kana">五十音</button>
    </nav>
  </div>
</header>

<main class="wrap" id="view"></main>

<footer>
  <div class="wrap">
    <p>本頁為單一檔案，無任何外部連線，離線可用。朗讀功能使用系統內建的日文語音：macOS 於「系統設定 → 輔助使用 → 語音內容」、Windows 於「設定 → 時間與語言 → 語音」、iOS／Android 於系統語音設定下載日文語音資料後即可離線發音；未安裝時僅無聲音，其他功能不受影響。學習進度儲存在此瀏覽器的本機空間中；跨裝置搬移可用「設定 → 紀錄同步」的匯出與匯入。</p>
  </div>
</footer>

<div id="modal" class="overlay hidden">
  <div class="sheet">
    <div class="sheet-head">
      <h2>設定</h2>
      <button id="closeModal" class="icon-btn" aria-label="關閉">✕</button>
    </div>
    <div class="srow"><span class="lbl">朗讀語速</span><input type="range" id="rateRange" min="0.5" max="1.2" step="0.05"><span id="rateVal" class="mut"></span></div>
    <div class="srow"><span class="lbl">日文語音</span><span id="voiceNote" class="mut">偵測中…</span></div>
    <div class="srow"><button id="resetBtn" class="btn danger">清除錯題紀錄</button></div>
    <div class="srow"><span class="lbl">紀錄同步</span><button id="expBtn" class="btn">匯出</button><button id="impBtn" class="btn">匯入</button></div>
    <textarea id="syncBox" class="syncbox" placeholder="匯出：按「匯出」產生代碼並自動複製，用訊息或 AirDrop 傳到另一台裝置。匯入：把對方的代碼貼在這裡，按「匯入」。"></textarea>
    <div class="srow"><span class="lbl">自動同步</span><span id="syncState" class="mut">未設定</span></div>
    <div class="srow"><input id="syncOwner" class="inp" placeholder="GitHub 使用者名稱"><input id="syncRepo" class="inp" placeholder="repo 名稱"></div>
    <div class="srow"><input id="syncToken" class="inp" type="password" placeholder="存取權杖 github_pat_…"></div>
    <div class="srow"><button id="syncSave" class="btn primary">儲存並測試</button><button id="syncOff" class="btn">停用</button></div>
  </div>
</div>

<div id="toast"></div>

/* ---------- 儲存（本機開啟時持久，受限環境自動退回記憶體） ---------- */
var store=(function(){
  try{
    var k="__jpb_test";
    localStorage.setItem(k,"1");localStorage.removeItem(k);
    return localStorage;
  }catch(e){
    var m={};
    return{
      getItem:function(k){return Object.prototype.hasOwnProperty.call(m,k)?m[k]:null;},
      setItem:function(k,v){m[k]=String(v);},
      removeItem:function(k){delete m[k];}
    };
  }
})();
function loadJSON(k,d){try{var s=store.getItem(k);return s?JSON.parse(s):d;}catch(e){return d;}}
var settings=loadJSON("jpb_settings",{rate:0.9});
if(!settings.v3){settings.rate=0.9;settings.v3=1;saveSettings2();}
function saveSettings2(){try{store.setItem("jpb_settings",JSON.stringify(settings));}catch(e){}}
function saveSettings(){store.setItem("jpb_settings",JSON.stringify(settings));}

var view=document.getElementById("view");

/* ---------- 工具 ---------- */
function rubyJP(jp){return jp.replace(/([\u4E00-\u9FFF\u3005]+)\[([^\]]*)\]/g,"<ruby>$1<rt>$2</rt></ruby>");}
function plainJP(jp){return jp.replace(/\[[^\]]*\]/g,"");}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
var toastTimer=null;
function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove("show");},1800);
}

/* ---------- 語音 ---------- */
var jaVoices=[];
function refreshVoices(){
  if(!window.speechSynthesis){updateVoiceNote();return;}
  try{
    jaVoices=speechSynthesis.getVoices().filter(function(v){
      return v.lang&&v.lang.toLowerCase().replace("_","-").indexOf("ja")===0;
    });
  }catch(e){jaVoices=[];}
  updateVoiceNote();
}
function updateVoiceNote(){
  var el=document.getElementById("voiceNote");
  if(!el)return;
  if(!window.speechSynthesis){el.textContent="此瀏覽器不支援語音合成";return;}
  el.textContent=jaVoices.length?jaVoices[0].name+"（共 "+jaVoices.length+" 個）":"未偵測到日文語音，安裝後請重新整理";
}
function speak(text,slow){
  if(!window.speechSynthesis){toast("此瀏覽器不支援語音");return;}
  if(!jaVoices.length)refreshVoices();
  var u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  if(jaVoices.length)u.voice=jaVoices[0];
  u.rate=slow?Math.max(0.45,settings.rate*0.6):settings.rate;
  try{speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}
}

function switchTab(t){
  curTab=t;
  var bs=document.querySelectorAll(".tab");
  for(var i=0;i<bs.length;i++)bs[i].classList.toggle("on",bs[i].getAttribute("data-tab")===t);
  if(t==="learn")renderLearn();
  else if(t==="kanji")renderKanji();
  else if(t==="glearn")renderGLearn();
  else if(t==="gsent")renderGSent();
  else if(t==="vbook")renderVBook();
  else if(t==="vocab")renderVocab();
  else if(t==="kquiz")renderKQuiz();
  else if(t==="listen")renderListen();
  else if(t==="reading")renderReading();
  else if(t==="grammar")renderGrammar();
  else renderKana();
  window.scrollTo(0,0);
}

/* ---------- 例句學習 ---------- */
var cur=0;
function renderLearn(){
  if(cur<0)cur=0;
  if(cur>=DATA.length)cur=DATA.length-1;
  var it=DATA[cur];
  var vrows="";
  for(var v=0;v<it.vocab.length;v++){
    var w=it.vocab[v];
    vrows+="<tr><td class='w'>"+w[0]+"</td><td class='k'>"+w[1]+"</td><td class='r'>"+w[2]+"</td><td>"+w[3]+"</td></tr>";
  }
  var grows="";
  for(var g=0;g<it.grammar.length;g++){
    grows+="<p class='gp'><b>"+it.grammar[g][0]+"</b>"+it.grammar[g][1]+"</p>";
  }
  view.innerHTML="<div class='card'>"+
    "<div class='tools'>"+
      "<button class='btn primary' id='playBtn'>▶ 朗讀</button>"+
      "<button class='btn' id='slowBtn'>慢速</button>"+
      "<span class='sp'></span>"+
      "<button class='btn' id='randBtn'>隨機</button>"+
    "</div>"+
    "<p class='jp'>"+rubyJP(it.jp)+"</p>"+
    "<p class='romaji'>"+it.romaji+"</p>"+
    "<p class='zh'>"+it.zh+"</p>"+
    "<p class='sec-t'>使用情境</p><div class='scene'>"+it.scene+"</div>"+
    "<p class='sec-t'>核心單字</p>"+
    "<table class='vocab'><thead><tr><th>單字</th><th>讀音</th><th>羅馬拼音</th><th>意思</th></tr></thead><tbody>"+vrows+"</tbody></table>"+
    "<p class='sec-t'>文法拆解</p>"+grows+
    "<div class='navr'>"+
      "<button class='btn' id='prevBtn'>‹ 上一句</button>"+
      "<span class='pos'>第 "+(cur+1)+"／"+DATA.length+" 句</span>"+
      "<button class='btn' id='nextBtn'>下一句 ›</button>"+
    "</div>"+
  "</div>";
  document.getElementById("playBtn").onclick=function(){speak(it.kana,false);};
  document.getElementById("slowBtn").onclick=function(){speak(it.kana,true);};
  document.getElementById("randBtn").onclick=function(){var r;do{r=Math.floor(Math.random()*DATA.length);}while(r===cur&&DATA.length>1);cur=r;renderLearn();};
  document.getElementById("prevBtn").onclick=function(){cur=(cur-1+DATA.length)%DATA.length;renderLearn();};
  document.getElementById("nextBtn").onclick=function(){cur=(cur+1)%DATA.length;renderLearn();};
}

var syncMute=false;
function eSave(k,o){
  try{localStorage.setItem(k,JSON.stringify(o));}catch(e){}
  if(!syncMute&&k!=="nikki_sync"&&k!=="nikki_syncmeta"&&typeof scheduleSync==="function")scheduleSync();
}
function eLoad(k){try{return JSON.parse(localStorage.getItem(k))||{};}catch(e){return {};}}
var vErr=eLoad("nikki_vErr"),gErr=eLoad("nikki_gErr");
var vSeen=eLoad("nikki_vSeen"),gSeen=eLoad("nikki_gSeen"),kSeen=eLoad("nikki_kSeen"),wSeen=eLoad("nikki_wSeen"),lSeen=eLoad("nikki_lSeen"),sSeen=eLoad("nikki_sSeen2");
function rng(n){var a=[];for(var i=0;i<n;i++)a.push(i);return a;}
function pickQ(pool,seen,err,last){
  var i,c,ks;
  var un=[];
  for(c=0;c<pool.length;c++)if(!seen[pool[c]])un.push(pool[c]);
  if(un.length)return un[Math.floor(Math.random()*un.length)];
  if(err){
    ks=Object.keys(err).filter(function(k){return pool.indexOf(parseInt(k,10))>=0;});
    if(ks.length&&Math.random()<0.35){
      i=parseInt(ks[Math.floor(Math.random()*ks.length)],10);
      if(i!==last)return i;
    }
  }
  if(pool.length===1)return pool[0];
  do{i=pool[Math.floor(Math.random()*pool.length)];}while(i===last);
  return i;
}
var Vs={i:-1,opts:null,done:false,pick:-1,last:-1,dir:0};
function newVocabQ(){
  var i=pickQ(rng(VOCAB.length),vSeen,vErr,Vs.last);
  Vs.last=i;Vs.i=i;
  vSeen[i]=1;eSave("nikki_vSeen",vSeen);
  var used={};used[VOCAB[i][3]]=1;
  var usedW={};usedW[VOCAB[i][0]]=1;
  var cand=[],guard=0;
  while(cand.length<3&&guard<900){
    guard++;
    var j=Math.floor(Math.random()*VOCAB.length);
    if(Vs.dir===0){
      var g=VOCAB[j][3];
      if(!used[g]){used[g]=1;cand.push(j);}
    }else{
      var w=VOCAB[j][0],g2=VOCAB[j][3];
      if(!usedW[w]&&!used[g2]){usedW[w]=1;used[g2]=1;cand.push(j);}
    }
  }
  Vs.opts=shuffle([i,cand[0],cand[1],cand[2]]);
  Vs.done=false;Vs.pick=-1;renderVocab();
}
function renderVocab(){
  var head="<div class='rowline'>"+
    "<button class='btn mini"+(Vs.dir===0?" primary":"")+"' id='vD0'>日→中</button>"+
    "<button class='btn mini"+(Vs.dir===1?" primary":"")+"' id='vD1'>中→日</button>"+
    "<span class='grow'></span>"+
  "</div>";
  var body;
  if(Vs.i<0){
    body="<div class='card centerc'><p>看日文選中文，或切成「中→日」反向練回想。<br>沒出過的字優先出；答錯的字會加重出現，答對一次就恢復。</p><button class='btn primary' id='vStart'>開始</button></div>";
  }else{
    var w=VOCAB[Vs.i];
    var opts="<div class='opts'>";
    for(var k=0;k<Vs.opts.length;k++){
      var oid=Vs.opts[k],cls="opt";
      if(Vs.done){
        if(oid===Vs.i)cls+=" correct";
        else if(oid===Vs.pick)cls+=" wrong";
      }
      opts+="<button class='"+cls+"' data-i='"+oid+"'"+(Vs.done?" disabled":"")+">"+(Vs.dir===0?VOCAB[oid][3]:VOCAB[oid][0])+"</button>";
    }
    opts+="</div>";
    var reveal="";
    if(Vs.done){
      reveal="<div class='reveal'>"+
        "<p class='romaji' style='text-align:center'>"+w[1]+"　"+w[2]+"</p>"+
        "<div class='tools' style='margin-top:8px'>"+
          "<button class='btn' id='vPlay'>▶ 朗讀</button>"+
          "<button class='btn' id='vSlow'>慢速</button>"+
          "<span class='sp'></span>"+
          "<button class='btn primary' id='vNext'>下一題 ›</button>"+
        "</div>"+
      "</div>";
    }
    body="<div class='card'><p class='qword'>"+(Vs.dir===0?w[0]:w[3])+"</p>"+opts+reveal+"</div>";
  }
  view.innerHTML=head+body;
  function reQ(){if(Vs.i!==-1)newVocabQ();else renderVocab();}
  document.getElementById("vD0").onclick=function(){if(Vs.dir!==0){Vs.dir=0;reQ();}};
  document.getElementById("vD1").onclick=function(){if(Vs.dir!==1){Vs.dir=1;reQ();}};
  var st=document.getElementById("vStart");
  if(st)st.onclick=newVocabQ;
  var pl=document.getElementById("vPlay");
  if(pl)pl.onclick=function(){speak(VOCAB[Vs.i][1],false);};
  var sl=document.getElementById("vSlow");
  if(sl)sl.onclick=function(){speak(VOCAB[Vs.i][1],true);};
  var nx=document.getElementById("vNext");
  if(nx)nx.onclick=newVocabQ;
  if(Vs.i>=0&&!Vs.done){
    var obs=view.querySelectorAll(".opt");
    for(var b=0;b<obs.length;b++){
      obs[b].onclick=function(){
        Vs.pick=parseInt(this.getAttribute("data-i"),10);
        Vs.done=true;
        if(Vs.pick===Vs.i){if(vErr[Vs.i])delete vErr[Vs.i];}
        else{vErr[Vs.i]=1;}
        eSave("nikki_vErr",vErr);
        renderVocab();
      };
    }
  }
}

var Rc={i:-1,seq:[],pick:[],done:false,last:-1};
function grPool(){
  if(Gs.scope<0)return rng(GR.length);
  var s=GLSEC[Gs.scope],a=[];
  for(var i=s[1];i<=s[2];i++)a.push(i);
  return a;
}
function newGrammarQ(){
  var i=pickQ(grPool(),gSeen,gErr,Gs.last);
  Gs.last=i;Gs.i=i;
  gSeen[i]=1;eSave("nikki_gSeen",gSeen);
  var g=GR[i];
  Gs.opts=shuffle([g[1],g[2],g[3],g[4]]);
  Gs.done=false;Gs.pick="";
  renderGrammar();
}
function newRcQ(){
  var i;
  do{i=Math.floor(Math.random()*RC.length);}while(i===Rc.last&&RC.length>1);
  Rc.last=i;Rc.i=i;
  var s;
  do{s=shuffle(rng(4));}while(s[0]===0&&s[1]===1&&s[2]===2&&s[3]===3);
  Rc.seq=s;Rc.pick=[];Rc.done=false;
  renderGrammar();
}
function renderGrammar(){
  var head="<div class='rowline'>"+
    "<button class='btn mini"+(Gs.mode===0?" primary":"")+"' id='gM0'>選擇題</button>"+
    "<button class='btn mini"+(Gs.mode===1?" primary":"")+"' id='gM1'>重組題</button>";
  if(Gs.mode===0){
    var sel="<select class='sel' id='gScope'><option value='-1'"+(Gs.scope<0?" selected":"")+">全部範圍</option>";
    for(var s=0;s<GLSEC.length;s++)sel+="<option value='"+s+"'"+(Gs.scope===s?" selected":"")+">"+GLSEC[s][0]+"</option>";
    sel+="</select>";
    head+=sel+"<span class='grow'></span>";
  }else{
    head+="<span class='grow'></span><span class='score'>共 "+RC.length+" 題</span>";
  }
  head+="</div>";
  var body;
  if(Gs.mode===1){
    if(Rc.i<0){newRcQ();return;}
    var it=RC[Rc.i],ch="";
    for(var k=0;k<4;k++){
      var c=Rc.seq[k],used=Rc.pick.indexOf(c)>=0;
      ch+="<button class='chunk"+(used?" used":"")+"' data-c='"+c+"'>"+rubyJP(it[0][c])+"</button>";
    }
    var ansTxt="";
    for(var a=0;a<Rc.pick.length;a++)ansTxt+=rubyJP(it[0][Rc.pick[a]]);
    var ok=Rc.done&&Rc.pick.every(function(x,idx){return x===idx;});
    var ans="<div class='ansline"+(Rc.done?(ok?" ok":" bad"):"")+"'>"+(ansTxt||"<span class='faintt'>點下面的片段，照正確順序排出句子</span>")+"</div>";
    var reveal="";
    if(Rc.done){
      var full=it[0].join("");
      reveal="<div class='reveal'>"+
        "<p class='jp' style='font-size:1.15rem'>"+rubyJP(full)+"</p>"+
        "<p class='zh'>"+it[1]+"</p>"+
        "<div class='tools' style='margin-top:10px'>"+
          "<button class='btn' id='rcPlay'>▶ 朗讀</button>"+
          "<span class='sp'></span>"+
          "<button class='btn primary' id='rcNext'>下一題 ›</button>"+
        "</div>"+
      "</div>";
    }
    body="<div class='card'>"+ans+"<div class='chunkwrap'>"+ch+"</div>"+
      "<div class='tools' style='margin-top:10px'><button class='btn mini' id='rcClear'>清除重排</button></div>"+reveal+"</div>";
  }else if(Gs.i<0){
    body="<div class='card centerc'><p>選出（　）裡正確的說法。<br>可以用上面的選單只練某一組文法點。<br>沒出過的題優先出；答錯的題會加重出現，答對一次就恢復。<br>還沒學過文法的話，先從「文法學習」分頁開始。</p><button class='btn primary' id='gStart'>開始</button></div>";
  }else{
    var g=GR[Gs.i];
    var opts="<div class='opts'>";
    for(var k2=0;k2<Gs.opts.length;k2++){
      var o=Gs.opts[k2],cls="opt";
      if(Gs.done){
        if(o===g[1])cls+=" correct";
        else if(o===Gs.pick)cls+=" wrong";
      }
      opts+="<button class='"+cls+"' data-o='"+k2+"'"+(Gs.done?" disabled":"")+">"+rubyJP(o)+"</button>";
    }
    opts+="</div>";
    var reveal2="";
    if(Gs.done){
      reveal2="<div class='reveal'>"+
        "<p class='jp' style='font-size:1.15rem'>"+rubyJP(g[0].replace("（　）","【"+g[1]+"】"))+"</p>"+
        "<p class='romaji'>"+GRRM[Gs.i]+"</p>"+
        "<p class='zh'>"+GRZH[Gs.i]+"</p>"+
        "<div class='scene'>"+g[5]+"</div>"+
        "<div class='tools' style='margin-top:12px'>"+
          "<span class='sp'></span>"+
          "<button class='btn primary' id='gNext'>下一題 ›</button>"+
        "</div>"+
      "</div>";
    }
    var skip=Gs.done?"":"<div class='tools' style='margin-top:10px'><span class='sp'></span><button class='btn mini' id='gSkip'>換一題</button></div>";
    body="<div class='card'><p class='jp' style='font-size:1.25rem'>"+rubyJP(g[0])+"</p>"+opts+skip+reveal2+"</div>";
  }
  view.innerHTML=head+body;
  document.getElementById("gM0").onclick=function(){if(Gs.mode!==0){Gs.mode=0;renderGrammar();}};
  document.getElementById("gM1").onclick=function(){if(Gs.mode!==1){Gs.mode=1;Rc.i=-1;renderGrammar();}};
  var sc=document.getElementById("gScope");
  if(sc)sc.onchange=function(){Gs.scope=parseInt(this.value,10);if(Gs.i!==-1)newGrammarQ();else renderGrammar();};
  var st=document.getElementById("gStart");
  if(st)st.onclick=newGrammarQ;
  var nx=document.getElementById("gNext");
  if(nx)nx.onclick=newGrammarQ;
  var sk=document.getElementById("gSkip");
  if(sk)sk.onclick=newGrammarQ;
  var rcc=document.getElementById("rcClear");
  if(rcc)rcc.onclick=function(){Rc.pick=[];Rc.done=false;renderGrammar();};
  var rcn=document.getElementById("rcNext");
  if(rcn)rcn.onclick=newRcQ;
  var rcp=document.getElementById("rcPlay");
  if(rcp)rcp.onclick=function(){speak(kanaOnly(RC[Rc.i][0].join("")),false);};
  if(Gs.mode===1&&!Rc.done){
    var cbs=view.querySelectorAll(".chunk");
    for(var cb=0;cb<cbs.length;cb++){
      cbs[cb].onclick=function(){
        var c=parseInt(this.getAttribute("data-c"),10);
        if(Rc.pick.indexOf(c)>=0)return;
        Rc.pick.push(c);
        if(Rc.pick.length===4)Rc.done=true;
        renderGrammar();
      };
    }
  }
  if(Gs.mode===0&&Gs.i>=0&&!Gs.done){
    var obs=view.querySelectorAll(".opt");
    for(var b=0;b<obs.length;b++){
      obs[b].onclick=function(){
        Gs.pick=Gs.opts[parseInt(this.getAttribute("data-o"),10)];
        Gs.done=true;
        if(Gs.pick===GR[Gs.i][1]){if(gErr[Gs.i])delete gErr[Gs.i];}
        else{gErr[Gs.i]=1;}
        eSave("nikki_gErr",gErr);
        renderGrammar();
      };
    }
  }
}

function kReads(s){
  if(s==="—")return s;
  var a=s.split("、"),o=[];
  for(var i=0;i<a.length;i++)o.push("<span class='krd' data-say='"+a[i].replace(/・/g,"")+"'>"+a[i]+"</span>");
  return o.join("、");
}
function renderKanji(){
  var h="<div class='rowline'><span class='score'>共 "+KANJI.length+" 字（通行 N5 漢字範圍）</span></div><div class='card' id='kjWrap'>";
  for(var i=0;i<KANJI.length;i++){
    var k=KANJI[i];
    h+="<div class='krow'>"+
      "<div class='kchar'>"+k[0]+"</div>"+
      "<div class='kinfo'>"+
        "<p class='kread'>音　"+kReads(k[1])+"<span class='ksep'>｜</span>訓　"+kReads(k[2])+"</p>"+
        (k[3]?"<p class='kex'>"+k[3]+"</p>":"")+
      "</div>"+
    "</div>";
  }
  h+=NUMTBL;
  h+="</div>";
  view.innerHTML=h;
  document.getElementById("kjWrap").onclick=function(e){
    var t=e.target;
    if(t&&t.className==="krd")speak(t.getAttribute("data-say"),false);
  };
}

var PRIMER="<p class='sec-t'>先修：動詞的三類</p><div class='gitem'><p class='gexp'>Ⅰ類（五段動詞）：書[か]く、飲[の]む、買[か]う、話[はな]す、聞[き]く等。<br>Ⅱ類（一段動詞）：〜る，且る前是い段或え段音…食[た]べる、見[み]る、起[お]きる、寝[ね]る。<br>Ⅲ類（不規則）：する、来[く]る。</p></div><p class='sec-t'>先修：ます形與敬體四態</p><div class='gitem'><p class='gexp'>Ⅰ類：字尾う段→い段＋ます（書く→書きます、飲む→飲みます）。<br>Ⅱ類：去る＋ます（食べる→食べます）。<br>Ⅲ類：する→します、来る→来[き]ます。<br>敬體四態：〜ます（現在）／〜ません（否定）／〜ました（過去）／〜ませんでした（過去否定）。</p></div><p class='sec-t'>先修：て形（很多句型都靠它）</p><div class='gitem'><p class='gexp'>Ⅰ類：く→いて（書いて）｜ぐ→いで（泳[およ]いで）｜う・つ・る→って（買って、待[ま]って、乗[の]って）｜む・ぶ・ぬ→んで（飲んで、遊[あそ]んで、死[し]んで）｜す→して（話して）｜例外：行[い]く→行って。<br>Ⅱ類：去る＋て（食べて）。<br>Ⅲ類：して、来[き]て。<br>た形：把て形的「て／で」換成「た／だ」（書いて→書いた、飲んで→飲んだ）。</p></div><p class='sec-t'>先修：ない形</p><div class='gitem'><p class='gexp'>Ⅰ類：う段→あ段＋ない（飲む→飲まない）；字尾「う」→わない（買う→買わない）。<br>Ⅱ類：去る＋ない（食べない）。<br>Ⅲ類：しない、来[こ]ない。</p></div><p class='sec-t'>先修：形容詞變化</p><div class='gitem'><p class='gexp'>い形容詞：高[たか]い／高くない／高かった／高くなかった；連接：高くて；修飾動詞：早[はや]く行く；特殊：いい→よくない、よかった、よく。<br>な形容詞：静[しず]かです／静かじゃありません／静かでした／静かじゃありませんでした；接名詞加な（静かな町[まち]）；連接：静かで。</p></div>";

var KW=[],HOMO={};
(function(){
  for(var i=0;i<VOCAB.length;i++){
    var w=VOCAB[i][0];
    if(w!==VOCAB[i][1]&&/[\u4E00-\u9FFF]/.test(w)){
      KW.push(i);
      var k=VOCAB[i][1];
      (HOMO[k]=HOMO[k]||[]).push(i);
    }
  }
})();
var DKP=[["か","が"],["き","ぎ"],["く","ぐ"],["け","げ"],["こ","ご"],["さ","ざ"],["し","じ"],["す","ず"],["せ","ぜ"],["そ","ぞ"],["た","だ"],["ち","ぢ"],["つ","づ"],["て","で"],["と","ど"],["は","ば"],["ひ","び"],["ふ","ぶ"],["へ","べ"],["ほ","ぼ"],["は","ぱ"],["ひ","ぴ"],["ふ","ぷ"],["へ","ぺ"],["ほ","ぽ"]];
function kMut(k){
  var cands=[],i,d;
  for(i=0;i<k.length;i++){
    for(d=0;d<DKP.length;d++){
      if(k[i]===DKP[d][0])cands.push(k.slice(0,i)+DKP[d][1]+k.slice(i+1));
      else if(k[i]===DKP[d][1])cands.push(k.slice(0,i)+DKP[d][0]+k.slice(i+1));
    }
  }
  var u=k.indexOf("う");
  if(u>0)cands.push(k.slice(0,u)+k.slice(u+1));
  if(k.length<=4)cands.push(k+"う");
  var t=k.indexOf("っ");
  if(t>=0)cands.push(k.slice(0,t)+k.slice(t+1));
  else if(k.length>=2)cands.push(k.slice(0,1)+"っ"+k.slice(1));
  return cands.filter(function(x){return x!==k&&x.length>0;});
}
var Kq={mode:0,i:-1,opts:[],ans:"",done:false,pick:"",last:-1};
function newKQ(){
  var seen=Kq.mode===0?kSeen:wSeen;
  var i=pickQ(KW,seen,null,Kq.last);
  Kq.last=i;Kq.i=i;
  seen[i]=1;eSave(Kq.mode===0?"nikki_kSeen":"nikki_wSeen",seen);
  var w=VOCAB[i],set={},o=[];
  if(Kq.mode===0){
    Kq.ans=w[1];set[w[1]]=1;
    var cs=shuffle(kMut(w[1]));
    for(var c=0;c<cs.length&&o.length<3;c++)if(!set[cs[c]]){set[cs[c]]=1;o.push(cs[c]);}
    var g1=0;
    while(o.length<3&&g1<300){g1++;var j=KW[Math.floor(Math.random()*KW.length)];var kk=VOCAB[j][1];if(!set[kk]){set[kk]=1;o.push(kk);}}
    Kq.opts=shuffle([w[1],o[0],o[1],o[2]]);
  }else{
    Kq.ans=w[0];set[w[0]]=1;
    var hs=HOMO[w[1]]||[];
    for(var h=0;h<hs.length&&o.length<3;h++){
      var ww=VOCAB[hs[h]][0];
      if(ww!==w[0]&&!set[ww]){set[ww]=1;o.push(ww);}

    while(o.length<3&&g2<300){g2++;var j2=KW[Math.floor(Math.random()*KW.length)];var w2=VOCAB[j2][0];if(!set[w2]&&VOCAB[j2][3]!==w[3]){set[w2]=1;o.push(w2);}}
    Kq.opts=shuffle([w[0],o[0],o[1],o[2]]);
  }
  Kq.done=false;Kq.pick="";renderKQuiz();
}
function renderKQuiz(){
  var head="<div class='rowline'>"+
    "<button class='btn mini"+(Kq.mode===0?" primary":"")+"' id='kM0'>漢字→讀音</button>"+
    "<button class='btn mini"+(Kq.mode===1?" primary":"")+"' id='kM1'>讀音→漢字</button>"+

  }else{
    var w=VOCAB[Kq.i];
    var opts="<div class='opts'>";
    for(var k=0;k<Kq.opts.length;k++){
      var o=Kq.opts[k],cls="opt";
      if(Kq.done){

        else if(o===Kq.pick)cls+=" wrong";
      }
      opts+="<button class='"+cls+"' data-o='"+k+"'"+(Kq.done?" disabled":"")+">"+o+"</button>";
    }
    opts+="</div>";

        "<p class='romaji' style='text-align:center'>"+w[2]+"　"+w[3]+"</p>"+
        "<div class='tools' style='margin-top:8px'>"+

          "<button class='btn' id='kSlow'>慢速</button>"+
          "<span class='sp'></span>"+
          "<button class='btn primary' id='kNext'>下一題 ›</button>"+
        "</div>"+
      "</div>";
    }
    body="<div class='card'><p class='qword'>"+(Kq.mode===0?w[0]:w[1])+"</p>"+opts+reveal+"</div>";
  }
  view.innerHTML=head+body;
  document.getElementById("kM0").onclick=function(){if(Kq.mode!==0){Kq.mode=0;if(Kq.i!==-1)newKQ();else renderKQuiz();}};
  document.getElementById("kM1").onclick=function(){if(Kq.mode!==1){Kq.mode=1;if(Kq.i!==-1)newKQ();else renderKQuiz();}};
  var st=document.getElementById("kStart");
  if(st)st.onclick=newKQ;
  var pl=document.getElementById("kPlay");
  if(pl)pl.onclick=function(){speak(VOCAB[Kq.i][1],false);};
  var sl=document.getElementById("kSlow");
  if(sl)sl.onclick=function(){speak(VOCAB[Kq.i][1],true);};
  var nx=document.getElementById("kNext");
  if(nx)nx.onclick=newKQ;
  if(Kq.i>=0&&!Kq.done){
    var obs=view.querySelectorAll(".opt");
    for(var b=0;b<obs.length;b++){
      obs[b].onclick=function(){
        Kq.pick=Kq.opts[parseInt(this.getAttribute("data-o"),10)];
        Kq.done=true;renderKQuiz();
      };
    }
  }
}

var NJI=["","いちじ","にじ","さんじ","よじ","ごじ","ろくじ","しちじ","はちじ","くじ","じゅうじ","じゅういちじ","じゅうにじ"];
var NFUN={5:"ごふん",10:"じゅっぷん",15:"じゅうごふん",20:"にじゅっぷん",30:"さんじゅっぷん",40:"よんじゅっぷん",45:"よんじゅうごふん",50:"ごじゅっぷん"};
var NGATSU=["","いちがつ","にがつ","さんがつ","しがつ","ごがつ","ろくがつ","しちがつ","はちがつ","くがつ","じゅうがつ","じゅういちがつ","じゅうにがつ"];
var NNICHI=(function(){
  var irr={1:"ついたち",2:"ふつか",3:"みっか",4:"よっか",5:"いつか",6:"むいか",7:"なのか",8:"ようか",9:"ここのか",10:"とおか",14:"じゅうよっか",20:"はつか",24:"にじゅうよっか"};
  var tens=["","じゅう","にじゅう","さんじゅう"],dig={1:"いち",2:"に",3:"さん",5:"ご",6:"ろく",7:"しち",8:"はち",9:"く"};

  for(var d=1;d<=31;d++){
    if(irr[d]){a[d]=irr[d];continue;}
    var t=Math.floor(d/10),u=d%10;
    a[d]=tens[t]+(u?dig[u]:"")+"にち";
  }
  return a;
})();
var NHYA={1:"ひゃく",2:"にひゃく",3:"さんびゃく",4:"よんひゃく",5:"ごひゃく",6:"ろっぴゃく",7:"ななひゃく",8:"はっぴゃく",9:"きゅうひゃく"};
var NSEN={1:"せん",2:"にせん",3:"さんぜん",4:"よんせん",5:"ごせん",6:"ろくせん",7:"ななせん",8:"はっせん",9:"きゅうせん"};
var NJU={1:"じゅう",2:"にじゅう",3:"さんじゅう",4:"よんじゅう",5:"ごじゅう",6:"ろくじゅう",7:"ななじゅう",8:"はちじゅう",9:"きゅうじゅう"};
var NHON={1:"いっぽん",2:"にほん",3:"さんぼん",4:"よんほん",5:"ごほん",6:"ろっぽん",7:"ななほん",8:"はっぽん",9:"きゅうほん",10:"じゅっぽん"};
var NKO={1:"いっこ",2:"にこ",3:"さんこ",4:"よんこ",5:"ごこ",6:"ろっこ",7:"ななこ",8:"はっこ",9:"きゅうこ",10:"じゅっこ"};
var NNIN={1:"ひとり",2:"ふたり",3:"さんにん",4:"よにん",5:"ごにん",6:"ろくにん",7:"しちにん",8:"はちにん",9:"きゅうにん",10:"じゅうにん"};
var NHIKI={1:"いっぴき",2:"にひき",3:"さんびき",4:"よんひき",5:"ごひき",6:"ろっぴき",7:"ななひき",8:"はっぴき",9:"きゅうひき",10:"じゅっぴき"};
function ri(n){return 1+Math.floor(Math.random()*n);}
function genNum(){
  var t=Math.floor(Math.random()*4),kana,disp,mk,set={},d=[];
  if(t===0){
    var ms=[5,10,15,20,30,40,45,50];
    var h=ri(12),m=ms[Math.floor(Math.random()*ms.length)];
    kana=NJI[h]+NFUN[m];
    mk=function(hh,mm){return hh+":"+("0"+mm).slice(-2);};
    disp=mk(h,m);set[disp]=1;
    var g=0;
    while(d.length<3&&g<100){
      g++;
      var h2=ri(12),m2=ms[Math.floor(Math.random()*ms.length)];
      var x=mk(h2,m2);
      if(!set[x]){set[x]=1;d.push(x);}
    }
  }else if(t===1){
    var mo=ri(12),dy=ri(31);
    kana=NGATSU[mo]+NNICHI[dy];
    disp=mo+"月"+dy+"日";set[disp]=1;
    if(dy===4||dy===8){
      var alt=mo+"月"+(dy===4?8:4)+"日";
      set[alt]=1;d.push(alt);
    }
    var g2=0;
    while(d.length<3&&g2<100){
      g2++;
      var x2=ri(12)+"月"+ri(31)+"日";
      if(!set[x2]){set[x2]=1;d.push(x2);}
    }
  }else if(t===2){
    var s,h3,tt;
    do{s=Math.floor(Math.random()*10);h3=Math.floor(Math.random()*10);tt=Math.floor(Math.random()*10);}while(s+h3+tt===0);
    kana=(s?NSEN[s]:"")+(h3?NHYA[h3]:"")+(tt?NJU[tt]:"")+"えん";
    var val=s*1000+h3*100+tt*10;
    disp=val+"円";set[disp]=1;
    var g3=0;
    while(d.length<3&&g3<100){
      g3++;
      var s2,h4,t4;
      do{s2=Math.floor(Math.random()*10);h4=Math.floor(Math.random()*10);t4=Math.floor(Math.random()*10);}while(s2+h4+t4===0);
      var x3=(s2*1000+h4*100+t4*10)+"円";
      if(!set[x3]){set[x3]=1;d.push(x3);}
    }
  }else{
    var cts=[["本",NHON],["個",NKO],["人",NNIN],["匹",NHIKI]];
    var ct=cts[Math.floor(Math.random()*cts.length)];
    var n=ri(10);
    kana=ct[1][n];disp=n+ct[0];set[disp]=1;
    if(n===1||n===8){
      var alt2=(n===1?8:1)+ct[0];
      set[alt2]=1;d.push(alt2);
    }
    var g4=0;
    while(d.length<3&&g4<100){
      g4++;
      var x4=ri(10)+ct[0];
      if(!set[x4]){set[x4]=1;d.push(x4);}
    }
  }
  return {kana:kana,ans:disp,opts:shuffle([disp,d[0],d[1],d[2]])};
}
var Ls={mode:0,i:-1,opts:null,done:false,pick:-1,pickS:"",num:null,last:-1};
function newLQ(){
  Ls.done=false;Ls.pick=-1;Ls.pickS="";Ls.num=null;
  if(Ls.mode===2){
    Ls.i=0;
    Ls.num=genNum();
    renderListen();
    speak(Ls.num.kana,false);
    return;
  }
  if(Ls.mode===0){
    var i=pickQ(rng(VOCAB.length),lSeen,null,Ls.last);
    Ls.last=i;Ls.i=i;
    lSeen[i]=1;eSave("nikki_lSeen",lSeen);
    var used={};used[VOCAB[i][3]]=1;
    var cand=[],g=0;
    while(cand.length<3&&g<900){
      g++;
      var j=Math.floor(Math.random()*VOCAB.length);
      var gl=VOCAB[j][3];
      if(!used[gl]){used[gl]=1;cand.push(j);}
    }
    Ls.opts=shuffle([i,cand[0],cand[1],cand[2]]);
    renderListen();
    speak(VOCAB[i][1],false);
    return;
  }
  var i2=pickQ(rng(DATA.length),sSeen,null,Ls.last);
  Ls.last=i2;Ls.i=i2;
  sSeen[i2]=1;eSave("nikki_sSeen2",sSeen);
  var used2={};used2[DATA[i2].zh]=1;
  var cand2=[],g2=0;
  while(cand2.length<3&&g2<600){
    g2++;
    var j2=Math.floor(Math.random()*DATA.length);
    if(!used2[DATA[j2].zh]){used2[DATA[j2].zh]=1;cand2.push(j2);}
  }
  Ls.opts=shuffle([i2,cand2[0],cand2[1],cand2[2]]);
  renderListen();
  speak(DATA[i2].kana,false);
}
function lReplay(slow){

];
var Rd={p:0,show:false,ord:{},ans:{}};
function renderReading(){
  var P=RD[Rd.p];
  var head="<div class='rowline'>"+
    "<button class='btn mini' id='rdPrev'>‹ 上一篇</button>"+
    "<span class='score'>第 "+(Rd.p+1)+"／"+RD.length+" 篇</span>"+
    "<button class='btn mini' id='rdNext'>下一篇 ›</button>"+
    "<button class='btn mini' id='rdRand'>隨機</button>"+
    "<span class='grow'></span></div>";
  var qh="";
  for(var j=0;j<P[3].length;j++){
    var q=P[3][j],key=Rd.p+"_"+j;
    if(!Rd.ord[key])Rd.ord[key]=shuffle([q[1],q[2],q[3],q[4]]);
    var picked=Rd.ans[key];
    qh+="<p class='gt' style='margin-top:16px'><b>問"+(j+1)+"．</b>"+rubyJP(q[0])+"</p><div class='opts'>";
    for(var k=0;k<4;k++){
      var o=Rd.ord[key][k],cls="opt";
      if(picked!==undefined){
        if(o===q[1])cls+=" correct";
        else if(o===picked)cls+=" wrong";
      }
      qh+="<button class='"+cls+"' data-key='"+key+"' data-k='"+k+"'"+(picked!==undefined?" disabled":"")+">"+rubyJP(o)+"</button>";
    }
    qh+="</div>";
  }
  var body="<div class='card'>"+
    "<p class='sec-t'>"+P[0]+"</p>"+
    "<p class='jp' style='font-size:1.12rem;line-height:2.2'>"+rubyJP(P[1])+"</p>"+
    "<div class='tools'>"+
      "<button class='btn' id='rdPlay'>▶ 朗讀</button>"+
      "<button class='btn' id='rdSlow'>慢速</button>"+
      "<span class='sp'></span>"+
      "<button class='btn"+(Rd.show?" primary":"")+"' id='rdZh'>顯示翻譯</button>"+
    "</div>"+
    (Rd.show?"<div class='scene'>"+P[2]+"</div>":"")+
    qh+
  "</div>";
  view.innerHTML=head+body;
  function go(np){Rd.p=np;Rd.show=false;renderReading();}
  document.getElementById("rdPrev").onclick=function(){go((Rd.p-1+RD.length)%RD.length);};
  document.getElementById("rdNext").onclick=function(){go((Rd.p+1)%RD.length);};
  document.getElementById("rdRand").onclick=function(){var r;do{r=Math.floor(Math.random()*RD.length);}while(r===Rd.p&&RD.length>1);go(r);};
  document.getElementById("rdPlay").onclick=function(){speak(kanaOnly(P[1]),false);};
  document.getElementById("rdSlow").onclick=function(){speak(kanaOnly(P[1]),true);};
  document.getElementById("rdZh").onclick=function(){Rd.show=!Rd.show;renderReading();};
  var obs=view.querySelectorAll(".opt");
  for(var b=0;b<obs.length;b++){
    obs[b].onclick=function(){
      var key=this.getAttribute("data-key");
      Rd.ans[key]=Rd.ord[key][parseInt(this.getAttribute("data-k"),10)];
      renderReading();
    };
  }
}

/* ---------- 五十音 ---------- */
var Ks={mode:"chart",script:"hira",set:"sei",q:null,opts:null,done:false,pick:"",right:0,total:0,lastKana:""};
function hiraToKata(s){
  return s.replace(/[\u3041-\u3096]/g,function(c){return String.fromCharCode(c.charCodeAt(0)+0x60);});
}
function kanaGroups(set){
  if(set==="sei")return SEI;
  if(set==="daku")return DAKU;
  if(set==="you")return YOU;
  return SEI.concat(DAKU,YOU);
}
function kanaPool(set,script){
  var groups=kanaGroups(set),pool=[];
  for(var i=0;i<groups.length;i++){
    var ks=groups[i][0].split(","),rs=groups[i][1].split(",");
    for(var j=0;j<ks.length;j++){
      pool.push([script==="kata"?hiraToKata(ks[j]):ks[j],rs[j]]);
    }
  }
  return pool;
}
function newKanaQ(){
  var pool=kanaPool(Ks.set,Ks.script);
  var q;
  do{q=pool[Math.floor(Math.random()*pool.length)];}while(pool.length>1&&q[0]===Ks.lastKana);
  Ks.lastKana=q[0];
  Ks.q=q;
  var others={},cand=[];
  for(var i=0;i<pool.length;i++){
    var r=pool[i][1];
    if(r!==q[1]&&!others[r]){others[r]=1;cand.push(r);}
  }
  shuffle(cand);
  Ks.opts=shuffle([q[1],cand[0],cand[1],cand[2]]);
  Ks.done=false;Ks.pick="";
  renderKana();
}
function kanaChartHTML(){
  var secs=[["清音",SEI],["濁音・半濁音",DAKU],["拗音",YOU]];
  var h="";
  for(var s=0;s<secs.length;s++){
    h+="<p class='sec-t'"+(s===0?" style='margin-top:0'":"")+">"+secs[s][0]+"</p>";
    var groups=secs[s][1];
    for(var i=0;i<groups.length;i++){
      var ks=groups[i][0].split(","),rs=groups[i][1].split(",");
      h+="<div class='krow'>";
      for(var j=0;j<ks.length;j++){
        var kn=Ks.script==="kata"?hiraToKata(ks[j]):ks[j];
        h+="<button class='kcell' data-k='"+kn+"'><span class='kk'>"+kn+"</span><span class='kr'>"+rs[j]+"</span></button>";
      }
      h+="</div>";
    }
  }
  return h;
}
function renderKana(){
  var scriptBtns="<button class='mini"+(Ks.script==="hira"?" act":"")+"' data-scr='hira'>ひらがな</button>"+
    "<button class='mini"+(Ks.script==="kata"?" act":"")+"' data-scr='kata'>カタカナ</button>";
  var modeBtns="<button class='mini"+(Ks.mode==="chart"?" act":"")+"' data-md='chart'>一覽表</button>"+
    "<button class='mini"+(Ks.mode==="quiz"?" act":"")+"' data-md='quiz'>測驗</button>";
  var head,body;
  if(Ks.mode==="chart"){
    head="<div class='rowline'>"+modeBtns+"<span class='grow'></span>"+scriptBtns+"</div>";
    body="<div class='card'>"+kanaChartHTML()+"<p class='score' style='margin:14px 0 0'>點任一假名可播放發音。</p></div>";
  }else{
    var setSel="<select id='kSet'>"+
      "<option value='sei'"+(Ks.set==="sei"?" selected":"")+">清音</option>"+
      "<option value='daku'"+(Ks.set==="daku"?" selected":"")+">濁音・半濁音</option>"+
      "<option value='you'"+(Ks.set==="you"?" selected":"")+">拗音</option>"+
      "<option value='all'"+(Ks.set==="all"?" selected":"")+">全部</option>"+
      "</select>";
    head="<div class='rowline'>"+modeBtns+"<span>範圍</span>"+setSel+scriptBtns+"<span class='grow'></span><span class='score'>答對 "+Ks.right+"／"+Ks.total+"</span></div>";
    if(!Ks.q){
      body="<div class='card centerc'><p>看假名，選出正確的羅馬拼音。<br>作答後可播放發音。</p><button class='btn primary' id='kStart'>開始</button></div>";
    }else{
      var opts="<div class='opts two'>";
      for(var i=0;i<Ks.opts.length;i++){
        var r=Ks.opts[i],cls="opt";
        if(Ks.done){
          if(r===Ks.q[1])cls+=" correct";
          else if(r===Ks.pick)cls+=" wrong";
        }
        opts+="<button class='"+cls+"' data-r='"+r+"'"+(Ks.done?" disabled":"")+">"+r+"</button>";
      }
      opts+="</div>";
      var reveal="";
      if(Ks.done){
        reveal="<div class='reveal'><div class='tools'>"+
          "<button class='btn' id='kPlay'>▶ 朗讀</button>"+
          "<button class='btn' id='kSlow'>慢速</button>"+
          "<span class='sp'></span>"+
          "<button class='btn primary' id='kNext'>下一題 ›</button>"+
        "</div></div>";
      }
      body="<div class='card'><p class='kbig'>"+Ks.q[0]+"</p>"+opts+reveal+"</div>";
    }
  }
  view.innerHTML=head+body;
  var mds=view.querySelectorAll("[data-md]");
  for(var a=0;a<mds.length;a++){
    mds[a].onclick=function(){Ks.mode=this.getAttribute("data-md");renderKana();};
  }
  var scs=view.querySelectorAll("[data-scr]");
  for(var b=0;b<scs.length;b++){
    scs[b].onclick=function(){
      Ks.script=this.getAttribute("data-scr");
      if(Ks.mode==="quiz"){Ks.q=null;Ks.right=0;Ks.total=0;Ks.lastKana="";}
      renderKana();
    };
  }
  var cells=view.querySelectorAll(".kcell");
  for(var c=0;c<cells.length;c++){
    cells[c].onclick=function(){speak(this.getAttribute("data-k"),false);};
  }
  var ks=document.getElementById("kSet");
  if(ks)ks.onchange=function(){Ks.set=this.value;Ks.q=null;Ks.right=0;Ks.total=0;Ks.lastKana="";renderKana();};
  var st=document.getElementById("kStart");
  if(st)st.onclick=newKanaQ;
  var pl=document.getElementById("kPlay");
  if(pl)pl.onclick=function(){speak(Ks.q[0],false);};
  var sl=document.getElementById("kSlow");
  if(sl)sl.onclick=function(){speak(Ks.q[0],true);};
  var nx=document.getElementById("kNext");
  if(nx)nx.onclick=newKanaQ;
  if(Ks.mode==="quiz"&&Ks.q&&!Ks.done){
    var obs=view.querySelectorAll(".opt");
    for(var k=0;k<obs.length;k++){
      obs[k].onclick=function(){
        Ks.pick=this.getAttribute("data-r");
        Ks.done=true;Ks.total++;
        if(Ks.pick===Ks.q[1])Ks.right++;
        renderKana();
        speak(Ks.q[0],false);
      };
    }
  }
}

/* ---------- 同步 ---------- */
var SYNC=eLoad("nikki_sync");
var syncTimer=null,syncBusy=false,syncQueued=false;
function syncEnabled(){return !!(SYNC&&SYNC.token&&SYNC.owner&&SYNC.repo);}
function syncStateText(){
  if(!syncEnabled())return "未設定";
  var m=eLoad("nikki_syncmeta");
  if(!m||!m.t)return "已設定，尚未同步";
  var d=new Date(m.t),hh=("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
  return (m.ok?"上次同步 ":"同步失敗 ")+hh;
}
function syncMeta(ok){
  eSave("nikki_syncmeta",{t:Date.now(),ok:!!ok});
  var el=document.getElementById("syncState");
  if(el)el.textContent=syncStateText();
}
function recObj(){
  function ks(o){return Object.keys(o).map(function(k){return parseInt(k,10);});}
  return {ver:1,ve:ks(vErr),ge:ks(gErr),vs:ks(vSeen),gs:ks(gSeen),kn:ks(kSeen),ws:ks(wSeen),ls:ks(lSeen),ss:ks(sSeen)};
}
function applyRec(d){
  function mg(o,a){if(a)for(var i=0;i<a.length;i++)o[a[i]]=1;}
  syncMute=true;
  mg(vErr,d.ve);mg(gErr,d.ge);mg(vSeen,d.vs);mg(gSeen,d.gs);mg(kSeen,d.kn);mg(wSeen,d.ws);mg(lSeen,d.ls);mg(sSeen,d.ss);
  eSave("nikki_vErr",vErr);eSave("nikki_gErr",gErr);eSave("nikki_vSeen",vSeen);eSave("nikki_gSeen",gSeen);
  eSave("nikki_kSeen",kSeen);eSave("nikki_wSeen",wSeen);eSave("nikki_lSeen",lSeen);eSave("nikki_sSeen2",sSeen);
  syncMute=false;
}
function ghURL(){return "https://api.github.com/repos/"+encodeURIComponent(SYNC.owner)+"/"+encodeURIComponent(SYNC.repo)+"/contents/record.json";}
function ghHead(){return {"Authorization":"Bearer "+SYNC.token,"Accept":"application/vnd.github+json","Content-Type":"application/json"};}
function b64e(s){return btoa(unescape(encodeURIComponent(s)));}
function b64d(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,""))));}
function pullSync(cb){
  if(!syncEnabled()){if(cb)cb(false);return;}
  fetch(ghURL(),{headers:ghHead(),cache:"no-store"}).then(function(r){
    if(r.status===404)return null;
    if(!r.ok)throw new Error(r.status);
    return r.json();
  }).then(function(j){
    if(j===null){if(cb)cb(null);return;}
    var d=null;
    try{d=JSON.parse(b64d(j.content));}catch(e){}
    if(d&&d.ver===1)applyRec(d);
    if(cb)cb(j.sha);
  }).catch(function(){if(cb)cb(false);});
}
function pushSync(){
  if(!syncEnabled())return;
  if(syncBusy){syncQueued=true;return;}
  syncBusy=true;
  pullSync(function(sha){
    if(sha===false){syncBusy=false;syncMeta(false);return;}
    var body={message:"sync",content:b64e(JSON.stringify(recObj()))};
    if(sha)body.sha=sha;
    fetch(ghURL(),{method:"PUT",headers:ghHead(),body:JSON.stringify(body)}).then(function(r){
      syncBusy=false;
      if(r.ok)syncMeta(true);
      else{syncMeta(false);if(r.status===409||r.status===422)scheduleSync();}
      if(syncQueued){syncQueued=false;scheduleSync();}
    }).catch(function(){syncBusy=false;syncMeta(false);});
  });
}
function scheduleSync(){
  if(!syncEnabled())return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushSync,8000);
}

  eSave("nikki_vErr",vErr);eSave("nikki_gErr",gErr);eSave("nikki_vSeen",vSeen);eSave("nikki_gSeen",gSeen);eSave("nikki_kSeen",kSeen);eSave("nikki_wSeen",wSeen);eSave("nikki_lSeen",lSeen);eSave("nikki_sSeen2",sSeen);
  document.getElementById("syncBox").value="";

document.getElementById("syncSave").onclick=function(){
  var o=document.getElementById("syncOwner").value.trim();

  SYNC={owner:o,repo:rp,token:tk};
  eSave("nikki_sync",SYNC);

    switchTab(curTab);
    toast("同步已啟用");
  });
};
